services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: crispy
      POSTGRES_PASSWORD: crispy
      POSTGRES_DB: crispy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://crispy:crispy@postgres:5432/crispy
      REDIS_URL: redis://redis:6379
    command: npm run dev:api
    ports:
      - "18765:18765"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      default:
      crispy-shared:
        aliases:
          - crispy-server-api

  worker:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://crispy:crispy@postgres:5432/crispy
      REDIS_URL: redis://redis:6379
    command: npm run dev:worker
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - default
      - crispy-shared

volumes:
  postgres-data:

networks:
  crispy-shared:
    external: true
    name: crispy-shared
