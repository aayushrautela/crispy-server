    RecommendationItem:
      type: object
      required: [id, position, mediaRef, metadataHint, score, reason, reasonCode, resolutionStatus, resolvedContentId, resolvedMediaKey, resolvedAt, resolutionError, createdAt]
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        position:
          type: integer
