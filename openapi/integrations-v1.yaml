                      nextCursor: eyJsYXN0SWQiOiIwMDAwMDAwMDAwMDAwMDAxMjM0NSJ9
                      hasMore: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: integration-api-key
      description: Integration API key supplied as `Authorization: Bearer <token>`.
    xApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: Alternative integration API key header accepted by the implementation.
    sessionAuth:
      type: apiKey
      in: cookie
      name: sid
      description: Browser/session authentication used by account API key management routes.

  parameters:
    KeyId:
      name: keyId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
      example: 018f5e9c-64b5-7d42-9ef1-1d9d93b70f20
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/Uuid'
      example: 018f5ed1-e248-7abe-a8a2-6bed1ef8bb48
    ListKey:
      name: listKey
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z0-9._:-]{1,100}$'
        minLength: 1
        maxLength: 100
      example: homepage:because-you-watched
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Cursor'
      examples:
        history:
          summary: History cursor
          value: eyJ1cGRhdGVkQXQiOiIyMDI2LTA0LTI5VDExOjMwOjAwLjAwMFoiLCJpZCI6IjAxOGY1ZjE2LTcxMjgtN2RlNi05YjVmLWQ5ZjAzNmQ4OTBjNyJ9
        changes:
          summary: Changes cursor
          value: eyJsYXN0SWQiOiIwMDAwMDAwMDAwMDAwMDAxMjM0NSJ9
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: Optional idempotency key for recommendation list writes. Reusing a key with a different normalized body returns 409.
      example: rec-write-20260429-0001

  headers:
    X-RateLimit-Limit:
      description: Maximum requests allowed in the active rate-limit window, when rate limiting is enabled.
      schema:
        type: integer
        minimum: 0
      example: 600
    X-RateLimit-Remaining:
      description: Requests remaining in the active rate-limit window, when rate limiting is enabled.
      schema:
        type: integer
        minimum: 0
      example: 599
    X-RateLimit-Reset:
      description: Unix timestamp, in seconds, when the active rate-limit window resets.
      schema:
        type: integer
        minimum: 0
      example: 1777467600
    Retry-After:
      description: Seconds to wait before retrying after rate limiting.
      schema:
        type: integer
        minimum: 0
      example: 60

  responses:
    BadRequest:
      description: Bad request.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            apiKeyNameRequired:
              value:
                code: api_key_name_is_required
                message: API key name is required.
            invalidListKey:
              value:
                error: listKey must match ^[a-zA-Z0-9._:-]{1,100}$
    Unauthorized:
      description: Authentication is missing or invalid.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missingIntegrationKey:
              value:
                code: missing_integration_api_key
                message: Missing integration API key.
    Forbidden:
      description: Authenticated principal is not allowed to access the resource.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                code: forbidden
                message: Forbidden.
    NotFound:
      description: Resource was not found or does not belong to the authenticated account.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            apiKeyNotFound:
              value:
                code: api_key_not_found
                message: API key not found.
            recommendationListNotFound:
              value:
                error: recommendation list not found
    Conflict:
      description: Request conflicts with existing state.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            idempotencyMismatch:
              value:
                error: same idempotency key with different body
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            rateLimited:
              value:
                code: rate_limit_exceeded
                message: Rate limit exceeded.
    InternalServerError:
      description: Internal server error.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                code: internal_server_error
                message: Internal server error

  schemas:
    Uuid:
      type: string
      format: uuid
    DateTime:
      type: string
      format: date-time
    JsonObject:
      type: object
      additionalProperties: true
    Cursor:
      type: string
      description: |
        Opaque base64url-encoded JSON cursor. History cursors encode `{ "updatedAt": string, "id": string }`.
        Change cursors encode `{ "lastId": string }`.
      contentEncoding: base64url
      examples:
        - eyJ1cGRhdGVkQXQiOiIyMDI2LTA0LTI5VDExOjMwOjAwLjAwMFoiLCJpZCI6IjAxOGY1ZjE2LTcxMjgtN2RlNi05YjVmLWQ5ZjAzNmQ4OTBjNyJ9
    Pagination:
      type: object
      required: [nextCursor, hasMore]
      additionalProperties: false
      properties:
        nextCursor:
          anyOf:
            - $ref: '#/components/schemas/Cursor'
            - type: 'null'
        hasMore:
          type: boolean
    ErrorResponse:
      description: Standard error-handler response `{code,message,details?}` or route-local recommendation error `{error}`.
      oneOf:
        - type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
            message:
              type: string
            details: {}
        - type: object
          required: [error]
          additionalProperties: false
          properties:
            error:
              type: string

    AccountApiKeyStatus:
      type: string
      enum: [active, revoked, expired]
    AccountApiKey:
      type: object
      required: [id, name, keyPrefix, status, createdAt, updatedAt, lastUsedAt, expiresAt, revokedAt, rotatedFromKeyId]
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        keyPrefix:
          type: string
        status:
          $ref: '#/components/schemas/AccountApiKeyStatus'
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
        lastUsedAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
        expiresAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
        revokedAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
        rotatedFromKeyId:
          anyOf:
            - $ref: '#/components/schemas/Uuid'
            - type: 'null'
    CreateApiKeyRequest:
      type: object
      required: [name]
      additionalProperties: true
      properties:
        name:
          type: string
          description: Required after trimming.
        expiresAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
    RotateApiKeyRequest:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
          description: Optional new name. Blank or missing values inherit the existing key name.
        expiresAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
    ApiKeyCreateResponse:
      type: object
      required: [key, plaintextToken]
      additionalProperties: false
      properties:
        key:
          $ref: '#/components/schemas/AccountApiKey'
        plaintextToken:
          type: string
          description: Plaintext integration API token. Returned only at creation/rotation time.
    ApiKeyRevokeResponse:
      type: object
      required: [revoked, key]
      additionalProperties: false
      properties:
        revoked:
          type: boolean
          const: true
        key:
          $ref: '#/components/schemas/AccountApiKey'

    Profile:
      type: object
      required: [id, name, avatarKey, isKids, sortOrder, createdAt, updatedAt]
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        avatarKey:
          anyOf:
            - type: string
            - type: 'null'
        isKids:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'

    ProviderIdValue:
      oneOf:
        - type: string
        - type: number
        - type: array
          items:
            oneOf:
              - type: string
              - type: number
    ProviderIds:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ProviderIdValue'
      examples:
        - tmdb: 603
          imdb: tt0133093
        - trakt:
            - 100
            - 101
    MediaRefSeriesRef:
      type: object
      additionalProperties: false
      properties:
        canonicalId:
          type: string
        providerIds:
          $ref: '#/components/schemas/ProviderIds'
    MediaRefBase:
      type: object
      additionalProperties: false
      properties:
        canonicalId:
          type: string
        providerIds:
          $ref: '#/components/schemas/ProviderIds'
        series:
          $ref: '#/components/schemas/MediaRefSeriesRef'
        seasonNumber:
          type: number
        episodeNumber:
          type: number
        seasonProviderIds:
          $ref: '#/components/schemas/ProviderIds'
        episodeProviderIds:
          $ref: '#/components/schemas/ProviderIds'
    MovieMediaRef:
      allOf:
        - $ref: '#/components/schemas/MediaRefBase'
        - type: object
          required: [mediaType]
          properties:
            mediaType:
              const: movie
    SeriesMediaRef:
      allOf:
        - $ref: '#/components/schemas/MediaRefBase'
        - type: object
          required: [mediaType]
          properties:
            mediaType:
              const: series
    SeasonMediaRef:
      allOf:
        - $ref: '#/components/schemas/MediaRefBase'
        - type: object
          required: [mediaType]
          properties:
            mediaType:
              const: season
            seasonNumber:
              type: number
    EpisodeMediaRef:
      allOf:
        - $ref: '#/components/schemas/MediaRefBase'
        - type: object
          required: [mediaType]
          properties:
            mediaType:
              const: episode
            seasonNumber:
              type: number
            episodeNumber:
              type: number
    MediaRef:
      description: |
        Media reference accepted and emitted by integration routes. Recommendation writes require at least one identity:
        `canonicalId`, non-empty `providerIds`, non-empty `seasonProviderIds`, non-empty `episodeProviderIds`,
        `series.canonicalId`, non-empty `series.providerIds`, episode `seasonNumber` plus `episodeNumber`,
        or season `seasonNumber`.
      oneOf:
        - $ref: '#/components/schemas/MovieMediaRef'
        - $ref: '#/components/schemas/SeriesMediaRef'
        - $ref: '#/components/schemas/SeasonMediaRef'
        - $ref: '#/components/schemas/EpisodeMediaRef'
      discriminator:
        propertyName: mediaType
        mapping:
          movie: '#/components/schemas/MovieMediaRef'
          series: '#/components/schemas/SeriesMediaRef'
          season: '#/components/schemas/SeasonMediaRef'
          episode: '#/components/schemas/EpisodeMediaRef'
    MetadataHint:
      type: object
      additionalProperties: true
      properties:
        title:
          type: string
        originalTitle:
          type: string
        overview:
          type: string
        releaseYear:
          type: number
        releaseDate:
          type: string
        posterUrl:
          type: string
          format: uri
        backdropUrl:
          type: string
          format: uri
        runtimeMinutes:
          type: number
        genres:
          type: array
          items:
            type: string
        rating:
          type: string
        externalUrl:
          type: string
          format: uri

    HistoryItem:
      type: object
      required: [id, mediaRef, status, updatedAt, isDeleted]
      additionalProperties: false
      properties:
        id:
          type: string
        mediaRef:
          $ref: '#/components/schemas/MediaRef'
        status:
          type: string
          enum: [in_progress, watched, watchlist]
        progress:
          type: object
          required: [positionSeconds, durationSeconds, progressPercent]
          additionalProperties: false
          properties:
            positionSeconds:
              anyOf:
                - type: number
                - type: 'null'
            durationSeconds:
              anyOf:
                - type: number
                - type: 'null'
            progressPercent:
              type: number
        watchedAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
        addedAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
        lastActivityAt:
          anyOf:
            - $ref: '#/components/schemas/DateTime'
            - type: 'null'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
        isDeleted:
          type: boolean

    RecommendationListWriteRequest:
      type: object
      required: [items]
      additionalProperties: true
      properties:
        title:
