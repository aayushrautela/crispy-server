            - type: 'null'
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
        metadata:
          $ref: '#/components/schemas/JsonObject'
    RecommendationListWithItems:
