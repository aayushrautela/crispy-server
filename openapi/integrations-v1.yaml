        mediaRef:
          $ref: '#/components/schemas/MediaRef'
        metadataHint:
          anyOf:
            - $ref: '#/components/schemas/MetadataHint'
            - type: 'null'
        score:
          anyOf:
            - type: number
            - type: 'null'
        reason:
          anyOf:
            - type: string
            - type: 'null'
        reasonCode:
          anyOf:
            - type: string
            - type: 'null'
        resolutionStatus:
