openapi: 3.1.0
info:
  title: Crispy Integration API
  version: 1.0.0
  summary: Production integration API for account API keys, profiles, history, changes, and recommendation lists.
  description: |
    Version 1 of the integration API is mounted under `/api/integrations/v1`.

    Session-authenticated endpoints manage integration API keys for the signed-in account.
    Bearer-authenticated endpoints use integration API keys and are scoped to the owning account.

    Cursor pagination uses opaque base64url-encoded JSON cursors returned by the API. Clients must
    pass cursor values back unchanged.
  license:
    name: Proprietary
servers:
  - url: /api/integrations/v1
    description: Integration API v1

security: []

tags:
  - name: API Keys
    description: Session-authenticated integration API key management.
  - name: Account
    description: Integration account introspection.
  - name: Profiles
    description: Account profile reads and watch-history export.
  - name: Recommendation Lists
    description: External recommendation list upsert and read APIs.
  - name: Changes
    description: Integration change outbox feed.

paths:
  /api-keys:
    post:
      tags: [API Keys]
      operationId: createIntegrationApiKey
      summary: Create an integration API key
      description: Creates a new integration API key for the authenticated user's account. The plaintext token is returned only once.
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
            examples:
              default:
                value:
                  name: Partner sync
                  expiresAt: '2026-12-31T23:59:59.000Z'
      responses:
        '201':
          description: API key created.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
              examples:
                created:
                  value:
                    key:
                      id: 018f5e9c-64b5-7d42-9ef1-1d9d93b70f20
                      name: Partner sync
                      keyPrefix: cak_live_2H4K8N
                      status: active
                      createdAt: '2026-04-29T10:15:30.000Z'
                      updatedAt: '2026-04-29T10:15:30.000Z'
                      lastUsedAt: null
                      expiresAt: '2026-12-31T23:59:59.000Z'
                      revokedAt: null
                      rotatedFromKeyId: null
                    plaintextToken: cak_live_2H4K8N_examplePlaintextSecret
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      tags: [API Keys]
      operationId: listIntegrationApiKeys
      summary: List integration API keys
      security:
        - sessionAuth: []
      responses:
        '200':
          description: API keys for the authenticated account.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [items]
                additionalProperties: false
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountApiKey'
              examples:
                list:
                  value:
                    items:
                      - id: 018f5e9c-64b5-7d42-9ef1-1d9d93b70f20
                        name: Partner sync
                        keyPrefix: cak_live_2H4K8N
                        status: active
                        createdAt: '2026-04-29T10:15:30.000Z'
                        updatedAt: '2026-04-29T10:15:30.000Z'
                        lastUsedAt: '2026-04-29T12:00:00.000Z'
                        expiresAt: null
                        revokedAt: null
                        rotatedFromKeyId: null
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api-keys/{keyId}:
    delete:
      tags: [API Keys]
      operationId: revokeIntegrationApiKey
      summary: Revoke an integration API key
      description: Revocation is idempotent. Revoking an already revoked key returns the existing revoked key.
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/KeyId'
      responses:
        '200':
          description: API key revoked.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyRevokeResponse'
              examples:
                revoked:
                  value:
                    revoked: true
                    key:
                      id: 018f5e9c-64b5-7d42-9ef1-1d9d93b70f20
                      name: Partner sync
                      keyPrefix: cak_live_2H4K8N
                      status: revoked
                      createdAt: '2026-04-29T10:15:30.000Z'
                      updatedAt: '2026-04-29T12:30:00.000Z'
                      lastUsedAt: '2026-04-29T12:00:00.000Z'
                      expiresAt: null
                      revokedAt: '2026-04-29T12:30:00.000Z'
                      rotatedFromKeyId: null
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api-keys/{keyId}/rotate:
    post:
      tags: [API Keys]
      operationId: rotateIntegrationApiKey
      summary: Rotate an integration API key
      description: Revokes the existing key when necessary and returns a newly created key and one-time plaintext token.
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/KeyId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateApiKeyRequest'
            examples:
              withName:
                value:
                  name: Partner sync rotated
                  expiresAt: '2027-01-31T23:59:59.000Z'
              inheritName:
                value:
                  expiresAt: null
      responses:
        '200':
          description: API key rotated.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
              examples:
                rotated:
                  value:
                    key:
                      id: 018f5ec4-5aa9-71b4-9980-8901110bb880
                      name: Partner sync rotated
                      keyPrefix: cak_live_9Q2W7P
                      status: active
                      createdAt: '2026-04-29T12:35:00.000Z'
                      updatedAt: '2026-04-29T12:35:00.000Z'
                      lastUsedAt: null
                      expiresAt: '2027-01-31T23:59:59.000Z'
                      revokedAt: null
                      rotatedFromKeyId: 018f5e9c-64b5-7d42-9ef1-1d9d93b70f20
                    plaintextToken: cak_live_9Q2W7P_examplePlaintextSecret
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /account:
    get:
      tags: [Account]
      operationId: getIntegrationAccount
      summary: Get integration account identity
      security:
        - bearerApiKey: []
        - xApiKey: []
      responses:
        '200':
          description: Authenticated integration account.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [account]
                additionalProperties: false
                properties:
                  account:
                    type: object
                    required: [id]
                    additionalProperties: false
                    properties:
                      id:
                        $ref: '#/components/schemas/Uuid'
              examples:
                account:
                  value:
                    account:
                      id: 018f4d0a-a3b8-7f50-8ec2-27c626b08a60
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /profiles:
    get:
      tags: [Profiles]
      operationId: listIntegrationProfiles
      summary: List account profiles
      security:
        - bearerApiKey: []
        - xApiKey: []
      responses:
        '200':
          description: Profiles owned by the integration account.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [items]
                additionalProperties: false
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Profile'
              examples:
                profiles:
                  value:
                    items:
                      - id: 018f5ed1-e248-7abe-a8a2-6bed1ef8bb48
                        name: Aayush
                        avatarKey: avatar-blue
                        isKids: false
                        sortOrder: 0
                        createdAt: '2026-04-01T09:00:00.000Z'
                        updatedAt: '2026-04-20T10:00:00.000Z'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /profiles/{profileId}:
    get:
      tags: [Profiles]
      operationId: getIntegrationProfile
      summary: Get a profile
      security:
        - bearerApiKey: []
        - xApiKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Profile details.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [profile]
                additionalProperties: false
                properties:
                  profile:
                    $ref: '#/components/schemas/Profile'
              examples:
                profile:
                  value:
                    profile:
                      id: 018f5ed1-e248-7abe-a8a2-6bed1ef8bb48
                      name: Aayush
                      avatarKey: avatar-blue
                      isKids: false
                      sortOrder: 0
                      createdAt: '2026-04-01T09:00:00.000Z'
                      updatedAt: '2026-04-20T10:00:00.000Z'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /profiles/{profileId}/history:
    get:
      tags: [Profiles]
      operationId: listIntegrationProfileHistory
      summary: List profile watch history
      description: Returns profile title projection entries ordered by `updatedAt DESC, id DESC`.
      security:
        - bearerApiKey: []
        - xApiKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/Cursor'
        - name: updatedSince
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Include records with `updatedAt >= updatedSince`.
          example: '2026-04-01T00:00:00.000Z'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Invalid or missing values default to 100; values above 500 are clamped to 500.
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: string
            enum: ['true', 'false']
            default: 'false'
          description: Deleted/dismissed items are included only when the exact string `true` is supplied.
      responses:
        '200':
          description: History page.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [items, pagination]
                additionalProperties: false
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/HistoryItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                history:
                  value:
                    items:
                      - id: 018f5f16-7128-7de6-9b5f-d9f036d890c7
                        mediaRef:
                          mediaType: episode
                          providerIds:
                            tmdb: '456'
                          series:
                            providerIds:
                              tmdb: '123'
                          seasonNumber: 2
                          episodeNumber: 5
                        status: in_progress
                        progress:
                          positionSeconds: 1800
                          durationSeconds: 2700
                          progressPercent: 66.67
                        lastActivityAt: '2026-04-29T11:30:00.000Z'
                        updatedAt: '2026-04-29T11:30:00.000Z'
                        isDeleted: false
                    pagination:
                      nextCursor: eyJ1cGRhdGVkQXQiOiIyMDI2LTA0LTI5VDExOjMwOjAwLjAwMFoiLCJpZCI6IjAxOGY1ZjE2LTcxMjgtN2RlNi05YjVmLWQ5ZjAzNmQ4OTBjNyJ9
                      hasMore: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /profiles/{profileId}/recommendation-lists:
    get:
      tags: [Recommendation Lists]
      operationId: listIntegrationRecommendationLists
      summary: List active recommendation lists
      description: Without `sourceKey`, lists are limited to the external recommendation source associated with the calling API key.
      security:
        - bearerApiKey: []
        - xApiKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - name: sourceKey
          in: query
          required: false
          schema:
            type: string
          description: Optional recommendation source key filter.
          example: api_key:cak_live_2H4K8N
      responses:
        '200':
          description: Active recommendation lists.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [items]
                additionalProperties: false
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecommendationListSummary'
              examples:
                lists:
                  value:
                    items:
                      - id: 018f5f3b-df38-7bd4-9621-12f81b4f3670
                        profileId: 018f5ed1-e248-7abe-a8a2-6bed1ef8bb48
                        sourceId: 018f5f38-85bc-72f3-acdc-7f576f1a3573
                        sourceKey: api_key:cak_live_2H4K8N
                        listKey: homepage:because-you-watched
                        title: Because you watched Severance
                        description: Personalized episodic recommendations.
                        algorithmKey: partner-v1
                        modelVersion: 2026-04-29
                        etag: 74d2c5f43fe2d138c4f03ab86fbbba10d53215f27d8e1d80cc12e8aefbb112f4
                        itemCount: 2
                        generatedAt: '2026-04-29T10:00:00.000Z'
                        expiresAt: '2026-04-30T10:00:00.000Z'
                        createdAt: '2026-04-29T10:01:00.000Z'
                        updatedAt: '2026-04-29T10:01:00.000Z'
                        metadata:
                          cohort: sci-fi
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /profiles/{profileId}/recommendation-lists/{listKey}:
    put:
      tags: [Recommendation Lists]
      operationId: putIntegrationRecommendationList
      summary: Upsert a recommendation list
      description: |
        Replaces the active list for the calling API key's external source and `listKey`.
        The request `items` array may contain at most 500 entries. Item positions are assigned from array order starting at 0.
      security:
        - bearerApiKey: []
        - xApiKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/ListKey'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationListWriteRequest'
            examples:
              full:
                value:
                  title: Because you watched Severance
                  description: Personalized episodic recommendations.
                  algorithmKey: partner-v1
                  modelVersion: 2026-04-29
                  generatedAt: '2026-04-29T10:00:00.000Z'
                  expiresAt: '2026-04-30T10:00:00.000Z'
                  metadata:
                    cohort: sci-fi
                  items:
                    - mediaRef:
                        mediaType: movie
                        providerIds:
                          tmdb: 603
                          imdb: tt0133093
                      metadataHint:
                        title: The Matrix
                        releaseYear: 1999
                        posterUrl: https://image.example/matrix.jpg
                      score: 0.98
                      reason: Similar themes and tone.
                      reasonCode: similar_title
                    - mediaRef:
                        mediaType: episode
                        series:
                          providerIds:
                            tmdb: 95396
                        seasonNumber: 1
                        episodeNumber: 1
                      metadataHint:
                        title: Good News About Hell
                      score: 0.91
                      reason: Pilot episode recommendation.
                      reasonCode: editorial_pick
      responses:
        '200':
          description: Recommendation list written or replayed by idempotency key.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationListResponse'
              examples:
                written:
                  $ref: '#/components/examples/RecommendationListResponseExample'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      tags: [Recommendation Lists]
      operationId: getIntegrationRecommendationList
      summary: Get a recommendation list
      description: Without `sourceKey`, returns the active list for the calling API key's external source.
      security:
        - bearerApiKey: []
        - xApiKey: []
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/ListKey'
        - name: sourceKey
          in: query
          required: false
          schema:
            type: string
          description: Optional recommendation source key selector.
          example: api_key:cak_live_2H4K8N
      responses:
        '200':
          description: Recommendation list with items.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationListResponse'
              examples:
                list:
                  $ref: '#/components/examples/RecommendationListResponseExample'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /changes:
    get:
      tags: [Changes]
      operationId: listIntegrationChanges
      summary: List account integration changes
      description: Returns account outbox events ordered by ascending event id after the decoded cursor `lastId`.
      security:
        - bearerApiKey: []
        - xApiKey: []
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          description: Invalid or missing values default to 100; values above 500 are clamped to 500.
      responses:
        '200':
          description: Change outbox page.
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/X-RateLimit-Limit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/X-RateLimit-Remaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/X-RateLimit-Reset'
          content:
            application/json:
              schema:
                type: object
                required: [items, pagination]
                additionalProperties: false
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationChange'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                changes:
                  value:
                    items:
                      - id: 00000000000000012345
                        eventId: 018f5f48-78d8-7d4a-a9f1-e63f26ae49da
                        accountId: 018f4d0a-a3b8-7f50-8ec2-27c626b08a60
                        profileId: 018f5ed1-e248-7abe-a8a2-6bed1ef8bb48
                        eventType: recommendation_list.upserted
                        aggregateType: recommendation_list
                        aggregateId: 018f5f3b-df38-7bd4-9621-12f81b4f3670
                        eventVersion: 1
                        occurredAt: '2026-04-29T10:01:00.000Z'
                        payload:
                          listId: 018f5f3b-df38-7bd4-9621-12f81b4f3670
                          profileId: 018f5ed1-e248-7abe-a8a2-6bed1ef8bb48
                          sourceId: 018f5f38-85bc-72f3-acdc-7f576f1a3573
                          sourceKey: api_key:cak_live_2H4K8N
                          listKey: homepage:because-you-watched
                          etag: 74d2c5f43fe2d138c4f03ab86fbbba10d53215f27d8e1d80cc12e8aefbb112f4
                          itemCount: 2
