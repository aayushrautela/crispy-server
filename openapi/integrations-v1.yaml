            - type: string
            - type: 'null'
        description:
          anyOf:
            - type: string
            - type: 'null'
        algorithmKey:
          anyOf:
            - type: string
            - type: 'null'
        modelVersion:
          anyOf:
            - type: string
            - type: 'null'
        generatedAt:
          anyOf:
            - type: string
            - type: 'null'
        expiresAt:
          anyOf:
            - type: string
            - type: 'null'
        metadata:
          anyOf:
            - $ref: '#/components/schemas/JsonObject'
            - type: 'null'
        items:
          type: array
          maxItems: 500
          items:
            $ref: '#/components/schemas/RecommendationItemWrite'
    RecommendationItemWrite:
      type: object
      required: [mediaRef]
      additionalProperties: true
      properties:
        mediaRef:
          $ref: '#/components/schemas/MediaRef'
        metadataHint:
          anyOf:
            - $ref: '#/components/schemas/MetadataHint'
            - type: 'null'
        score:
          anyOf:
            - type: number
            - type: 'null'
        reason:
          anyOf:
            - type: string
            - type: 'null'
        reasonCode:
          anyOf:
            - type: string
            - type: 'null'
    RecommendationListSummary:
      type: object
      required: [id, profileId, sourceId, sourceKey, listKey, title, description, algorithmKey, modelVersion, etag, itemCount, generatedAt, expiresAt, createdAt, updatedAt, metadata]
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        profileId:
          $ref: '#/components/schemas/Uuid'
        sourceId:
          $ref: '#/components/schemas/Uuid'
        sourceKey:
          type: string
        listKey:
          type: string
        title:
