        eventType:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
        eventVersion:
          type: integer
        occurredAt:
          $ref: '#/components/schemas/DateTime'
        payload:
          $ref: '#/components/schemas/JsonObject'
        createdAt:
          $ref: '#/components/schemas/DateTime'

