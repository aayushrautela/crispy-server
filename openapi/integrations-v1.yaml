        description:
          anyOf:
            - type: string
            - type: 'null'
        algorithmKey:
          anyOf:
            - type: string
            - type: 'null'
        modelVersion:
          anyOf:
            - type: string
            - type: 'null'
        etag:
          type: string
        itemCount:
