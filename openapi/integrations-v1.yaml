  title: Crispy Integration API - Retired
  version: 1.0.0
  summary: Retired integration API notice.
  description: |
    `/api/integrations/v1` is retired and is not a supported privileged RECO interface.

    Recommendation engines and other privileged app principals must use `/internal/apps/v1`
    for app-principal workflows and `/internal/confidential/v1` for confidential config bundles.

    Do not add compatibility adapters from `/api/integrations/v1` to the internal privileged app APIs.
